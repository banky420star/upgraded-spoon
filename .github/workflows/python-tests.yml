name: Python tests

on:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: 02_Core_Python
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: 02_Core_Python
        run: pytest tests -q --tb=short
